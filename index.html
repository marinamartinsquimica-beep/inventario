<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Inventário - Formulário</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background: #000000;
        color: white;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
        min-height: 100vh;
        box-sizing: border-box;
    }

    h2 {
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
    }

    .container {
        width: 100%;
        max-width: 380px;
        padding: 0 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    input, select {
        width: 100%;
        padding: 14px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #444;
        background-color: #1a1a1a;
        color: white;
        box-sizing: border-box;
    }

    button {
        background: #2196F3;
        color: white;
        padding: 16px;
        font-size: 20px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        width: 100%;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.97);
    }
</style>
</head>

<body>

<h2>Inventário - Formulário</h2>

<div class="container">

    <!-- DATA -->
    <input type="text" placeholder="Data (dd/mm/aaaa)">

    <!-- ÁREA -->
    <select>
        <option value="">Selecione a área</option>
        <option>ÁREA SUJA</option>
        <option>ÁREA LIMPA</option>
    </select>

    <!-- TIPO (Caixa / Ovo / Quantidades) -->
    <select>
        <option value="">Selecione o tipo</option>
        <option>CAIXA</option>
        <option>OVO</option>
        <option>QUANTIDADES</option>
    </select>

    <!-- SKU -->
    <input type="text" placeholder="SKU">

    <!-- LOTE -->
    <input type="text" placeholder="Lote (formato Lxx.xx)">

    <!-- DATA DE POSTURA -->
    <input type="text" placeholder="Data de Postura (.xx.xx.xx)">

    <button>Salvar</button>

</div>

</body>
</html>
