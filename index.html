<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Inventário - Cadastro</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #000000;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    h2 {
        margin-bottom: 20px;
        text-align: center;
    }

    form {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    input[type="text"],
    input[type="number"],
    input[type="email"],
    select,
    textarea {
        background-image: none !important;
        background-repeat: no-repeat;
        background-position: left center;
        background-size: 0;
        width: 100%;
        padding: 14px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #444;
        color: white;
        background-color: #1a1a1a;
        box-sizing: border-box;
    }

    button {
        background: #2196F3;
        color: white;
        padding: 16px 24px;
        font-size: 20px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.97);
    }

    @media (max-width: 768px) {
        input, select, textarea, button {
            width: 100%;
            font-size: 16px;
        }
    }
</style>
</head>

<body>

<h2>Cadastro de Lotes</h2>

<form>
    <input type="text" placeholder="Nome do lote">
    <input type="number" placeholder="Quantidade de aves">
    <input type="text" placeholder="Raça">
    <input type="number" placeholder="Idade (em semanas)">
    <textarea placeholder="Observações"></textarea>
    <button type="submit">Salvar</button>
</form>

</body>
</html>
