<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Inventário - Formulário</title>

<style>
    /* Remove qualquer rolagem lateral */
    html, body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background: #000000;
        color: white;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
        min-height: 100vh;
        box-sizing: border-box;
    }

    h2 {
        margin-bottom: 20px;
        text-align: center;
        width: 100%;
    }

    /* CONTAINER RESPONSIVO REAL */
    .container {
        width: 100%;
        max-width: 380px; /* tamanho ideal para celular */
        padding: 0 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* Remove ícones internos */
    input,
    select,
    textarea {
        background-image: none !important;
        -webkit-appearance: none !important;
        -moz-appearance: none !important;
        appearance: none !important;
    }

    /* Remove ícone do calendário */
    input[type="date"]::-webkit-calendar-picker-indicator {
        display: none !important;
    }

    /* Remove setas do number */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none !important;
        margin: 0 !important;
    }

    /* Estilo dos campos */
    input,
    select,
    textarea {
        width: 100%;
        padding: 14px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #444;
        background-color: #1a1a1a;
        color: white;
        box-sizing: border-box;
    }

    button {
        background: #2196F3;
        color: white;
        padding: 16px;
        font-size: 20px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        width: 100%;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.97);
    }
</style>
</head>

<body>

<h2>Inventário - Formulário</h2>

<div class="container">

    <input type="text" placeholder="Data (dd/mm/aaaa)">
    <input type="text" placeholder="Área">
    <input type="text" placeholder="SKU">
    <input type="text" placeholder="Lote (formato Lxx.xx)">
    <input type="text" placeholder="Data de Postura (.xx.xx.xx)">
    <button>Salvar</button>

</div>

</body>
</html>
