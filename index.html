<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Inventário - Formulário</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #000000;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    h2 {
        margin-bottom: 20px;
        text-align: center;
    }

    form {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* Remove QUALQUER ícone interno */
    input,
    select,
    textarea {
        background-image: none !important;
        -webkit-appearance: none !important;
        -moz-appearance: none !important;
        appearance: none !important;
    }

    /* Remove ícones de calendário */
    input[type="date"]::-webkit-calendar-picker-indicator {
        display: none !important;
        -webkit-appearance: none !important;
    }

    /* Remove setas de number */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none !important;
        margin: 0 !important;
    }

    /* Remove ícones automáticos do Chrome */
    input::-webkit-search-decoration,
    input::-webkit-search-cancel-button,
    input::-webkit-search-results-button,
    input::-webkit-search-results-decoration {
        display: none !important;
    }

    /* Remove seta do select */
    select::-ms-expand {
        display: none !important;
    }

    /* Estilo dos campos */
    input,
    select,
    textarea {
        width: 100%;
        padding: 14px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #444;
        color: white;
        background-color: #1a1a1a;
        box-sizing: border-box;
    }

    button {
        background: #2196F3;
        color: white;
        padding: 16px 24px;
        font-size: 20px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: 0.2s;
    }

    button:active {
        transform: scale(0.97);
    }

    @media (max-width: 768px) {
        input, select, textarea, button {
            width: 100%;
            font-size: 16px;
        }
    }
</style>
</head>

<body>

<h2>Inventário - Formulário</h2>

<form>
    <input type="text" placeholder="Data (dd/mm/aaaa)">
    <input type="text" placeholder="Área">
    <input type="text" placeholder="SKU">
    <input type="text" placeholder="Lote (formato Lxx.xx)">
    <input type="text" placeholder="Data de Postura (.xx.xx.xx)">
    <button type="submit">Salvar</button>
</form>

</body>
</html>
