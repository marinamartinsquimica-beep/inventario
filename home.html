<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Inventário - Home</title>

<link rel="manifest" href="manifest.json">

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #000000;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;

        /* Abertura mais lenta */
        opacity: 0;
        animation: fadeIn 2.5s ease forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .logo {
        width: 70%;
        max-width: 700px;
        margin-bottom: 20px;
        border-radius: 20px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    p {
        font-size: 18px;
        opacity: 0.8;
        margin-bottom: 40px;
        max-width: 300px;
    }

    .btn {
        background: #2196F3;
        color: white;
        padding: 18px 30px;
        font-size: 22px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        width: 80%;
        max-width: 300px;
        transition: 0.2s;
    }

    .btn:active {
        transform: scale(0.97);
    }
</style>
</head>

<body>

<!-- Splash universal na abertura -->
<img src="splash-2732x2732.png" class="logo">

<h1>Inventário</h1>
<p>Controle rápido e fácil de lotes, postura e estoque.</p>

<button class="btn" onclick="window.location.href='index.html'">
    Entrar
</button>

</body>
</html>
